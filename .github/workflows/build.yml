name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows app
    runs-on: windows-latest

    permissions:
      contents: read

    env:
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck and build frontend
        run: npm run build

      - name: Check Tauri backend
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app
        run: npm run tauri:build

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: mine-autobackup-windows
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
          if-no-files-found: error

  publish:
    name: Publish Windows build
    runs-on: ubuntu-latest
    needs: build-windows
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows installers
        uses: actions/download-artifact@v4
        with:
          name: mine-autobackup-windows
          path: release-assets

      - name: Resolve app version tag
        if: github.ref == 'refs/heads/main'
        id: version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create app version tag
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git tag -f "${{ steps.version.outputs.tag }}"
          git push -f origin "${{ steps.version.outputs.tag }}"

      - name: Publish app version build
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Mine AutoBackup ${{ steps.version.outputs.tag }}
          body: |
            Build automático da versão ${{ steps.version.outputs.version }}.

            Commit: ${{ github.sha }}
          make_latest: true
          overwrite_files: true
          files: |
            release-assets/**/*.msi
            release-assets/**/*.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            release-assets/**/*.msi
            release-assets/**/*.exe
